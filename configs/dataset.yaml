project:
  name: surface_defect_inspection
  seed: 42

scene:
  units: meters
  table_size: [1.2, 0.8, 0.04]
  camera:
    focal_length: 35.0
    resolution: [640, 480]
    position: [0.0, -0.85, 0.65]
    look_at: [0.0, 0.0, 0.0]
  objects:
    - name: metal_panel
      size: [0.55, 0.35, 0.015]
      defect_classes: [scratch, dent, stain]

randomization:
  lighting:
    intensity: {min: 250.0, max: 1200.0}
    color_temperature: {min: 3200.0, max: 7000.0}
    position_jitter: {min: -0.25, max: 0.25}
  camera:
    yaw_deg: {min: -18.0, max: 18.0}
    pitch_deg: {min: -10.0, max: 8.0}
    distance: {min: 0.7, max: 1.05}
  surface:
    roughness: {min: 0.25, max: 0.85}
    metallic: {min: 0.1, max: 0.9}
    color:
      - [0.55, 0.57, 0.58]
      - [0.25, 0.28, 0.30]
      - [0.72, 0.70, 0.66]
  defects:
    count: {min: 1, max: 5}
    length_px: {min: 24, max: 160}
    width_px: {min: 2, max: 12}

export:
  output_dir: outputs/dataset
  image_format: png
  include_depth: true
  include_masks: true
  annotation_format: coco

