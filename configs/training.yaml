dataset:
  root: outputs/dataset
  num_classes: 4
  classes: [background, scratch, dent, stain]
  validation_split: 0.2

training:
  seed: 42
  epochs: 5
  batch_size: 4
  learning_rate: 0.0003
  image_size: [256, 256]
  device: auto

output:
  model_dir: models/segmentation
  metrics_path: outputs/training_metrics.json

